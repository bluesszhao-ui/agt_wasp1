name: wasp1 nightly random IRQ campaign

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/wasp1-nightly.yml"
      - "wasp1/Makefile"
      - "wasp1/dv/wasp1_random_irq_multiseed.py"
      - "wasp1/dv/tests/test_random_irq_campaign.py"
      - "wasp1/tb/tb_wasp1.sv"
      - "llvm_s1/bsp/examples/random_irq_stress.c"
  schedule:
    - cron: "17 18 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: wasp1-nightly-random-irq
  cancel-in-progress: false

jobs:
  random-irq-campaign:
    runs-on: macos-14
    timeout-minutes: 90

    steps:
      - name: Check out wasp1
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install LLVM, lld, and Verilator
        run: |
          brew install llvm lld verilator
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"
          echo "$(brew --prefix lld)/bin" >> "$GITHUB_PATH"

      - name: Run 32-seed random IRQ campaign
        env:
          REQUIRE_RISCV_TOOLCHAIN: "1"
          RANDOM_IRQ_NIGHTLY_SEED_COUNT: "32"
        run: make -C wasp1 sim-random-irq-nightly

      - name: Archive campaign reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: wasp1-random-irq-nightly
          if-no-files-found: error
          retention-days: 30
          path: |
            wasp1/logs/random_irq_nightly.log
            wasp1/logs/random_irq_nightly_summary.json
            wasp1/logs/random_irq_nightly_summary.md
            wasp1/logs/random_irq_seed_*.log
            wasp1/logs/random_irq_runner_test.log
            wasp1/logs/tb_wasp1_random_irq_nightly_build.log
