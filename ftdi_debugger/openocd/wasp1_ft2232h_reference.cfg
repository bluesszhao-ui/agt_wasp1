# Reference OpenOCD configuration for the planned wasp1 FT2232H debugger.
#
# This file assumes the reference mapping documented in
# ftdi_debugger/docs/ftdi_debugger_spec.md:
#   ADBUS0=TCK, ADBUS1=TDI, ADBUS2=TDO, ADBUS3=TMS,
#   ADBUS4=nTRST, ADBUS5=nSRST, ADBUS6=TARGET_EN.
#
# Update VID/PID, channel, and layout values if the final PCB mapping changes.

adapter driver ftdi
ftdi vid_pid 0x0403 0x6010
ftdi channel 0

# FTDI low-byte defaults:
#   data      0x0078 -> TMS=1, nTRST=1, nSRST=1, TARGET_EN=1
#   direction 0x007b -> TCK/TDI/TMS/nTRST/nSRST/TARGET_EN outputs, TDO input
#
# TARGET_EN is ANDed with the board's VREF_VALID indication before the
# active-low level-shifter enables are asserted. Its external pulldown keeps
# all target-facing signals high-Z before OpenOCD configures Channel A.
ftdi layout_init 0x0078 0x007b
ftdi layout_signal nTRST -data 0x0010 -oe 0x0010
ftdi layout_signal nSRST -data 0x0020 -oe 0x0020

transport select jtag
adapter speed 1000
reset_config trst_and_srst separate

set _CHIPNAME wasp1
set _TARGETNAME $_CHIPNAME.cpu

jtag newtap $_CHIPNAME cpu -irlen 5 -expected-id 0x100001cf
target create $_TARGETNAME riscv -chain-position $_CHIPNAME.cpu

riscv set_command_timeout_sec 10

init
halt
